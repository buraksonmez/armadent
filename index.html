<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yakında Hizmetinizdeyiz | Yapım Aşamasında</title>
    <!-- İkonlar için FontAwesome Kütüphanesi -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        /* Logo Alanı */
        .logo-container {
            margin-bottom: 25px;
        }

        .logo {
            max-width: 180px; /* Logonuzun genişliğini buradan ayarlayabilirsiniz */
            max-height: 80px;
            object-fit: contain;
        }

        /* Logo yoksa kullanılacak varsayılan ikon */
        .default-icon {
            font-size: 48px;
            color: #3182ce;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a202c;
        }

        p {
            font-size: 15px;
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .divider {
            height: 2px;
            width: 50px;
            background: #3182ce;
            margin: 0 auto 24px auto;
            border-radius: 2px;
        }

        /* İletişim Bilgileri */
        .contact-info {
            font-size: 14px;
            color: #4a5568;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
            margin-bottom: 25px;
        }

        .contact-item {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .contact-link {
            color: #3182ce;
            text-decoration: none;
            font-weight: 500;
        }

        .contact-link:hover {
            text-decoration: underline;
        }

        /* Sosyal Medya İkonları */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .social-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #f7fafc;
            color: #4a5568;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
        }

        .social-icon.facebook:hover {
            background: #3b5998;
            color: white;
            border-color: #3b5998;
        }

        .social-icon.instagram:hover {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            border-color: transparent;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- LOGO ALANI -->
        <div class="logo-container">
            <!-- Logonuz hazır olduğunda aşağıdaki "logo.png" kısmını kendi logonuzla değiştirin -->
            <img src="armadent_logo.png" alt="Firma Logosu" class="logo" onerror="this.style.display='none'; document.getElementById('backup-icon').style.display='inline-block';">
            <div id="backup-icon" class="default-icon" style="display: none;">🚀</div>
        </div>

        <h1>Çok Yakında Buradayız!</h1>
        <div class="divider"></div>
        <p>Web sitemiz şu anda yapım aşamasındadır. Sizlere daha iyi bir deneyim sunmak için heyecanla çalışıyoruz. Lütfen takipte kalın!</p>
        
        <!-- İLETİŞİM VE TELEFONLAR -->
        <div class="contact-info">
            <div class="contact-item">
                <i class="fa-solid fa-phone" style="color: #718096;"></i>
                <a href="tel:+905447214466" class="contact-link">0544 721 44 66</a>
            </div>
            <div class="contact-item">
                <i class="fa-solid fa-phone" style="color: #718096;"></i>
                <a href="tel:+903246141488" class="contact-link">0324 614 14 88</a>
            </div>
        </div>

        <!-- SOSYAL MEDYA -->
        <div class="social-links">
            <a href="https://www.facebook.com/share/1DxD1bHGWM/?mibextid=wwXIfr" target="_blank" class="social-icon facebook" title="Facebook">
                <i class="fa-brands fa-facebook-f"></i>
            </a>
            <a href="https://www.instagram.com/tarsusdentalklinik?igsh=MmQ2YzZxNHo3b25w" target="_blank" class="social-icon instagram" title="Instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
        </div>
    </div>

</body>
</html>
